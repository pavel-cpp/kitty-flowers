services:
  postgres:
    container_name: postgres
    image: postgres:latest
    env_file:
      - configs/docker.env
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  bot:
    container_name: bot
    build:
      dockerfile: Dockerfile
    env_file:
      - configs/docker.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge